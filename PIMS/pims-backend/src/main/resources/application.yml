spring:
  application:
    name: pims-backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/pims?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    
server:
  port: 8081
  servlet:
    context-path: /api

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: pims-secret-key-for-jwt-token-generation-2024
  expiration: 86400000  # 24小时（毫秒）

# Swagger/Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh_cn
